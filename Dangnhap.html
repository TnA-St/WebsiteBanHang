<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đăng Nhập</title>

    <!-- Hai trang cùng sử dụng một file CSS -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

    <header class="navbar">
        <!-- Logo đã đồng nhất với những trang còn lại -->
        <div class="logo">
            <a href="index.html" class="logo-box" title="Về trang chủ">
                💻
            </a>
        </div>

        <nav class="menu-chinh">
            <a href="trangchu.html">Trang chủ</a>
            <a href="gioithieu.html">Giới thiệu</a>

            <!-- Không còn class active đặt sai -->
            <a href="phukien.html">Phụ kiện Điện Thoại</a>

            <a href="dienthoai.html">Điện thoại</a>
            <a href="laptop.html">LapTop</a>
            <a href="phukienmaytinh.html">Phụ kiện Máy tính</a>
            <a href="Dangnhap.html" class="btn-orange">Đăng nhập</a>
            <a href="DangKy.html" class="btn-blue">Đăng ký</a>
        </nav>
    </header>

    <main>
        <div class="title-container">
            <h1>Đăng Nhập</h1>
            <p>Tài khoản bán hàng</p>
        </div>

        <div class="form-card">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="loginUsername">Tên tài khoản</label>

                    <input
                        type="text"
                        id="loginUsername"
                        name="username"
                        placeholder="Value"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="loginPassword">Mật khẩu</label>

                    <input
                        type="password"
                        id="loginPassword"
                        name="password"
                        placeholder="Value"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" class="btn-submit">
                    Đăng nhập
                </button>
            </form>
        </div>
    </main>

</body>
</html>
